<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Last Moon - شيخ ياسين</title>
<style>
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#000; }
video#bgVideo { position: fixed; top:50%; left:50%; min-width:100%; min-height:100%; width:auto; height:auto; transform: translate(-50%, -50%); z-index:-2; object-fit:cover; filter: brightness(0.6); }
.particles { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:-1; }
.content { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); text-align:center; color:#fff; }
.content img { width:200px; height:200px; border-radius:50%; border:4px solid #ff4500; margin-bottom:20px; animation:fadeIn 2s ease-in-out; }
h1 { font-size:3.5rem; margin:10px 0; color:#ffcc00; text-shadow: 0 0 20px #ff4500, 0 0 30px #ff4500; animation:fadeIn 2s 1s ease-in-out; }
p { font-size:1.8rem; margin:10px 0; color:#fff; text-shadow: 0 0 10px #ff0000; animation:fadeIn 2s 2s ease-in-out; }
span.btn { display:inline-block; padding:15px 30px; background:#ff4500; color:#fff; font-size:1.5rem; border-radius:8px; margin-top:20px; animation:fadeIn 2s 3s ease-in-out; box-shadow: 0 0 20px #ff4500, 0 0 30px #ffcc00; }
@keyframes fadeIn { from {opacity:0; transform: translateY(20px);} to {opacity:1; transform: translateY(0);} }
</style>
</head>
<body>

<!-- خلفية فيديو متحرك -->
<video id="bgVideo" autoplay muted loop playsinline>
  <source src="رابط_الفيديو_من_Google_Drive.mp4" type="video/mp4">
</video>

<canvas class="particles" id="particleCanvas"></canvas>

<div class="content">
  <img src="https://cdn.discordapp.com/avatars/854339377245192213/43646d3ddeda8a40b40eda2bdca3bb33.png?size=1024" alt="شيخ ياسين">
  <h1>أهلاً وسهلاً بـ شيخ ياسين</h1>
  <p>أحلى تحية لك من شيخ توفيق</p>
  <span class="btn">Last Moon</span>
</div>

<!-- موسيقى MP3 مباشر -->
<audio id="bgMusic" autoplay loop>
  <source src="رابط_الأغنية_من_Google_Drive.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];
const colors = ['#ff4500', '#ffcc00', '#ff0000'];

class Particle {
  constructor(){
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*canvas.height;
    this.size = Math.random()*3 + 1;
    this.speedX = Math.random()*1 - 0.5;
    this.speedY = Math.random()*1 - 0.5;
    this.color = colors[Math.floor(Math.random()*colors.length)];
  }
  update(){
    this.x += this.speedX;
    this.y += this.speedY;
    if(this.x<0 || this.x>canvas.width) this.speedX*=-1;
    if(this.y<0 || this.y>canvas.height) this.speedY*=-1;
  }
  draw(){
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();
  }
}

function init(){
  for(let i=0;i<200;i++){
    particlesArray.push(new Particle());
  }
}
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particlesArray.forEach(p=>{p.update();p.draw();});
  requestAnimationFrame(animate);
}
init();
animate();
</script>

</body>
</html>
